<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Financeiro Pro | Cloud</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --primary: #0f172a; 
            --primary-accent: #334155; 
            --bg-body: #ffffff; 
            --bg-secondary: #f8fafc;
            --text-main: #000000;
            --text-muted: #475569;
            --border-color: #000000;
            --border-soft: #e2e8f0;
            --radius: 2px;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.02em;
            padding-bottom: 50px;
        }

        .app-header {
            background: var(--bg-body);
            padding: 1.5rem 0;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .db-badge {
            background: #22c55e; /* Verde para indicar Online */
            color: #fff;
            padding: 4px 10px;
            border-radius: var(--radius);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-pills {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 0;
            border-radius: var(--radius);
            display: inline-flex;
        }
        .nav-pills .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 0;
            padding: 10px 25px;
            border-right: 1px solid var(--border-color);
        }
        .nav-pills .nav-link:last-child { border-right: none; }
        .nav-pills .nav-link.active { background-color: var(--primary); color: #fff; }

        .card { border: 1px solid var(--border-color); border-radius: var(--radius); margin-bottom: 1.5rem; }

        .total-card { 
            padding: 1.25rem; 
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
        }
        .total-icon {
            width: 40px; height: 40px; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            background: var(--primary); color: #fff;
        }

        .form-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
        .form-control, .form-select { border-radius: var(--radius); border: 1px solid var(--border-color); }

        .btn-primary { background-color: var(--primary); border: 1px solid var(--border-color); font-weight: 700; text-transform: uppercase; }

        .table thead th { background: var(--primary); color: #fff; font-size: 0.7rem; text-transform: uppercase; border: 1px solid var(--border-color); }
        
        .btn-action {
            width: 32px; height: 32px; border-radius: var(--radius);
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color); background: white;
        }

        .divider-box {
            background: var(--bg-secondary); padding: 8px 12px;
            border: 1px solid var(--border-soft); margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            font-weight: 800; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">Sincronizando com Firebase...</div>

    <header class="app-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h4 class="m-0 fw-800">GESTÃO FINANCEIRA</h4>
                <div class="mt-1"><span class="db-badge">CLOUD: ATIVO</span></div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark btn-sm rounded-0 fw-700 px-3" onclick="exportarBackup()">BACKUP</button>
                <button class="btn btn-outline-dark btn-sm rounded-0 fw-700 px-3" onclick="document.getElementById('input-import').click()">RESTAURAR</button>
                <input type="file" id="input-import" style="display:none" onchange="importarParaFirebase(this)">
            </div>
        </div>
    </header>

    <div class="container">
        <div class="mb-4">
            <ul class="nav nav-pills" id="mainTabs">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#content-lancamentos">LANÇAMENTOS</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-relatorios">RELATÓRIOS</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-config">AJUSTES</button></li>
            </ul>
        </div>

        <div class="tab-content">
            <div class="tab-pane fade show active" id="content-lancamentos">
                <div class="card p-4">
                    <h6 class="fw-800 mb-4 text-uppercase">Nova Despesa</h6>
                    <form id="form-nova-despesa">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Descrição</label>
                                <input type="text" class="form-control" id="form-desc" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Data Vencimento</label>
                                <input type="date" class="form-control" id="form-vencimento" required>
                            </div>
                            <div class="col-6 col-md-4">
                                <label class="form-label">Valor (BRL)</label>
                                <input type="text" class="form-control" id="form-valor" placeholder="0,00" required>
                            </div>
                            <div class="col-6 col-md-2">
                                <label class="form-label">Parcelas</label>
                                <input type="number" class="form-control" id="form-qtd-parcelas" value="1" min="1">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label">Pagante</label>
                                <select id="form-pagante" class="form-select" required></select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Categoria</label>
                                <select id="form-categoria" class="form-select" required></select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Status</label>
                                <select id="form-status" class="form-select" required></select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Divisão:</label>
                                <div id="form-dividir-com" class="p-3 bg-light border" style="max-height: 200px; overflow-y: auto;"></div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-4">Salvar no Cloud</button>
                    </form>
                </div>

                <div class="mt-4 pb-5">
                    <h6 class="fw-800 text-muted mb-3 text-uppercase small">Atividades Recentes</h6>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <tbody id="log-home-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-relatorios">
                <div class="card p-4 mb-4">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-4"><label class="form-label">Mês</label><select id="filtro-mes" class="form-select"></select></div>
                        <div class="col-md-4"><label class="form-label">Ano</label><select id="filtro-ano" class="form-select"></select></div>
                        <div class="col-md-4"><button class="btn btn-primary w-100" onclick="buscarRelatorio()">Filtrar</button></div>
                    </div>
                </div>
                <div id="area-relatorio" style="display: none;">
                    <div id="container-totais" class="row row-cols-1 row-cols-md-3 g-3 mb-5"></div>
                    <div class="card p-4 mb-4 bg-light">
                         <div class="row g-2">
                             <div class="col-sm-9"><select id="select-extrato" class="form-select"></select></div>
                             <div class="col-sm-3"><button class="btn btn-dark w-100 fw-700" onclick="abrirPopupExtrato()">Gerar Quadro</button></div>
                         </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover"><thead id="head-rel"><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Pagante</th><th>Status</th><th class="text-end">Opções</th></tr></thead><tbody id="tabela-relatorio-body"></tbody></table>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="content-config">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card p-4 h-100">
                            <h6>NOMES</h6>
                            <div class="input-group mb-3"><input type="text" id="add-nome" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('nomes', 'add-nome')">+</button></div>
                            <div id="lista-nomes"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-4 h-100">
                            <h6>CATEGORIAS</h6>
                            <div class="input-group mb-3"><input type="text" id="add-cat" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('categorias', 'add-cat')">+</button></div>
                            <div id="lista-categorias"></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card p-4 h-100">
                            <h6>STATUS</h6>
                            <div class="input-group mb-3"><input type="text" id="add-status" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('status', 'add-status')">+</button></div>
                            <div id="lista-status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE (Substitua pelos seus dados do console)
        const firebaseConfig = {
            databaseURL: "https://gestorfinanceiro-eb906-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const dbFirebase = getDatabase(app);
        const dbRef = ref(dbFirebase, 'gestor_pro');

        let db = { lancamentos: {}, config: { nomes: [], categorias: [], status: [] } };

        // Escuta o banco em tempo real
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db = {
                    lancamentos: data.lancamentos || {},
                    config: data.config || { nomes: [], categorias: [], status: [] }
                };
            }
            document.getElementById('loading-overlay').style.display = 'none';
            refreshUI();
            renderizarRecentes();
        });

        // Funções Globais expostas para o HTML
        window.salvarNovoLancamento = async (e) => {
            e.preventDefault();
            const valorTotal = parseFloat(document.getElementById('form-valor').value.replace(/\./g, '').replace(',', '.'));
            const qtd = parseInt(document.getElementById('form-qtd-parcelas').value) || 1;
            const divisao = capturarValoresDivisao('form-dividir-com');
            const dataOrig = document.getElementById('form-vencimento').value;
            const groupId = "G" + Date.now();

            for (let i = 0; i < qtd; i++) {
                const dataObj = new Date(dataOrig + 'T12:00:00');
                dataObj.setMonth(dataObj.getMonth() + i);
                
                const novoRef = push(ref(dbFirebase, 'gestor_pro/lancamentos'));
                await set(novoRef, {
                    id: novoRef.key,
                    groupId: qtd > 1 ? groupId : null,
                    desc: document.getElementById('form-desc').value.toUpperCase() + (qtd > 1 ? ` (${i+1}/${qtd})` : ""),
                    vencimento: dataObj.toISOString().split('T')[0],
                    valor: valorTotal,
                    categoria: document.getElementById('form-categoria').value,
                    pagante: document.getElementById('form-pagante').value,
                    status: document.getElementById('form-status').value,
                    divisao: divisao
                });
            }
            e.target.reset();
            alert("Sincronizado com Firebase!");
        };

        window.salvarConfig = (path, inputId) => {
            const val = document.getElementById(inputId).value.trim();
            if(!val) return;
            const novaLista = [...(db.config[path] || []), val];
            update(ref(dbFirebase, 'gestor_pro/config'), { [path]: novaLista });
            document.getElementById(inputId).value = '';
        };

        window.removerConfig = (path, index) => {
            if(!confirm("Remover?")) return;
            const novaLista = [...db.config[path]];
            novaLista.splice(index, 1);
            update(ref(dbFirebase, 'gestor_pro/config'), { [path]: novaLista });
        };

        window.importarParaFirebase = (input) => {
            const f = input.files[0];
            const r = new FileReader();
            r.onload = async (e) => {
                const j = JSON.parse(e.target.result);
                // Converte array do JSON antigo para objeto do Firebase
                const lancamentosObj = {};
                if(Array.isArray(j.lancamentos)) {
                    j.lancamentos.forEach(l => { lancamentosObj[push(ref(dbFirebase, 'temp')).key] = l; });
                }
                await set(ref(dbFirebase, 'gestor_pro'), {
                    config: j.config,
                    lancamentos: lancamentosObj
                });
                alert("Dados migrados para o Cloud com sucesso!");
            };
            r.readAsText(f);
        };

        // --- Helper functions adaptadas ---
        function refreshUI() {
            const conf = db.config;
            popularSelect('form-categoria', conf.categorias || []);
            popularSelect('form-status', conf.status || []);
            popularSelect('form-pagante', conf.nomes || []);
            gerarOpcoesDivisao('form-dividir-com', conf.nomes || []);
            renderizarListasConfig();
        }

        function renderizarRecentes() {
            const b = document.getElementById('log-home-body');
            const lista = Object.values(db.lancamentos).sort((a,b) => b.vencimento.localeCompare(a.vencimento));
            b.innerHTML = lista.slice(0, 10).map(d => `
                <tr class="bg-white">
                    <td width="90" class="fw-bold text-muted small">${d.vencimento.split('-').reverse().slice(0,2).join('/')}</td>
                    <td><div class="fw-bold small">${d.desc}</div><small class="text-muted">${d.categoria}</small></td>
                    <td class="fw-900">R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                </tr>
            `).join('');
        }

        // Inicialização de máscaras e eventos
        document.getElementById('form-nova-despesa').onsubmit = window.salvarNovoLancamento;
        configurarFiltrosData();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Funções de UI (popularSelect, gerarOpcoesDivisao, etc) permanecem idênticas ao original
        function popularSelect(id, lista) {
            const el = document.getElementById(id);
            if (!el) return;
            const val = el.value;
            el.innerHTML = '<option value="">- SELECIONAR -</option>' + 
                           lista.map(i => `<option value="${i}">${i}</option>`).join('');
            el.value = val;
        }

        function gerarOpcoesDivisao(containerId, nomes) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = nomes.map((nome, idx) => `
                <div class="divider-box">
                    <div class="form-check m-0">
                        <input class="form-check-input border-dark" type="checkbox" id="${containerId}-${idx}" value="${nome}" onchange="togglePerc(this)">
                        <label class="form-check-label small fw-bold" for="${containerId}-${idx}">${nome}</label>
                    </div>
                    <input type="number" class="form-control perc-field border-dark" style="width: 70px;" disabled>
                </div>
            `).join('');
        }

        function togglePerc(cb) {
            const field = cb.closest('.divider-box').querySelector('.perc-field');
            field.disabled = !cb.checked;
        }

        function configurarFiltrosData() {
            const m = document.getElementById('filtro-mes'), a = document.getElementById('filtro-ano'), h = new Date();
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            if(m) meses.forEach((nm, i) => m.add(new Option(nm.toUpperCase(), ('0'+(i+1)).slice(-2), false, i === h.getMonth())));
            if(a) for(let i = h.getFullYear(); i >= h.getFullYear()-2; i--) a.add(new Option(i, i));
        }

        function capturarValoresDivisao(containerId) {
            const res = [];
            document.getElementById(containerId).querySelectorAll('.divider-box').forEach(row => {
                const cb = row.querySelector('.form-check-input'), pf = row.querySelector('.perc-field');
                if(cb.checked) res.push(pf.value ? `${cb.value}:${pf.value}` : cb.value);
            });
            return res;
        }
    </script>
</body>
</html>
