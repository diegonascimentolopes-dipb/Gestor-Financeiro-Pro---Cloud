<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Financeiro Pro - Cloud</title>
    
    <!-- PWA & Mobile Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Externas -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --primary: #0f172a; 
            --primary-accent: #334155; 
            --bg-body: #ffffff; 
            --bg-secondary: #f8fafc;
            --text-main: #000000;
            --text-muted: #475569;
            --border-color: #000000;
            --border-soft: #e2e8f0;
            --radius: 2px;
        }

        body { 
            background-color: var(--bg-body); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.02em;
            padding-bottom: 50px;
        }

        .app-header {
            background: var(--bg-body);
            padding: 1.5rem 0;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .db-badge {
            background: #22c55e;
            color: #fff;
            padding: 4px 10px;
            border-radius: var(--radius);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-pills {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 0;
            border-radius: var(--radius);
            display: inline-flex;
        }
        .nav-pills .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 0;
            padding: 10px 25px;
            border-right: 1px solid var(--border-color);
        }
        .nav-pills .nav-link:last-child { border-right: none; }
        .nav-pills .nav-link.active {
            background-color: var(--primary);
            color: #fff;
        }

        .card { 
            border: 1px solid var(--border-color); 
            border-radius: var(--radius); 
            margin-bottom: 1.5rem;
            background: #fff;
        }

        .total-card { 
            padding: 1.25rem; 
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid var(--border-color);
        }
        .total-icon {
            width: 40px; height: 40px;
            border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center;
            background: var(--primary); color: #fff;
        }

        .form-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .form-control, .form-select {
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            padding: 0.65rem 0.8rem;
        }

        .btn-primary {
            background-color: var(--primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-weight: 700;
            text-transform: uppercase;
        }

        .table thead th { 
            background: var(--primary); 
            color: #fff; 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            border: 1px solid var(--border-color);
        }

        .btn-action {
            width: 32px; height: 32px;
            border-radius: var(--radius);
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color);
            background: white; color: var(--primary);
        }

        .divider-box {
            background: var(--bg-secondary);
            padding: 8px 12px;
            border: 1px solid var(--border-soft);
            margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .badge-status {
            padding: 3px 8px; border-radius: var(--radius);
            font-size: 0.65rem; font-weight: 800;
            border: 1px solid var(--border-color); background: #fff;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h4 class="m-0 fw-800">GESTÃO FINANCEIRA PRO</h4>
                <div class="mt-1"><span class="db-badge">NUVEM ATIVA</span></div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark btn-sm rounded-0 fw-700 px-3" onclick="exportarBackup()">BACKUP</button>
                <button class="btn btn-dark btn-sm rounded-0 fw-700 px-3" onclick="document.getElementById('input-import').click()">RESTAURAR (JSON)</button>
                <input type="file" id="input-import" style="display:none" onchange="window.importarParaNuvem(this)">
            </div>
        </div>
    </header>

    <div class="container">
        <div class="mb-4">
            <ul class="nav nav-pills" role="tablist">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#content-lancamentos">LANÇAMENTOS</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-relatorios">RELATÓRIOS</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#content-config">AJUSTES</button></li>
            </ul>
        </div>

        <div class="tab-content">
            <!-- ABA LANÇAMENTOS -->
            <div class="tab-pane fade show active" id="content-lancamentos">
                <div class="card p-4">
                    <h6 class="fw-800 mb-4 text-uppercase">Nova Despesa</h6>
                    <form id="form-nova-despesa">
                        <div class="row g-3">
                            <div class="col-md-8"><label class="form-label">Descrição</label><input type="text" class="form-control" id="form-desc" required></div>
                            <div class="col-md-4"><label class="form-label">Data Vencimento</label><input type="date" class="form-control" id="form-vencimento" required></div>
                            <div class="col-6 col-md-4"><label class="form-label">Valor (BRL)</label><input type="text" class="form-control" id="form-valor" placeholder="0,00" required></div>
                            <div class="col-6 col-md-2"><label class="form-label">Parcelas</label><input type="number" class="form-control" id="form-qtd-parcelas" value="1" min="1"></div>
                            <div class="col-12 col-md-6"><label class="form-label">Pagante</label><select id="form-pagante" class="form-select" required></select></div>
                            <div class="col-6"><label class="form-label">Categoria</label><select id="form-categoria" class="form-select" required></select></div>
                            <div class="col-6"><label class="form-label">Status</label><select id="form-status" class="form-select" required></select></div>
                            <div class="col-12"><label class="form-label">Configuração de Divisão:</label><div id="form-dividir-com" class="p-3 bg-light border border-dark border-opacity-10" style="max-height: 250px; overflow-y: auto;"></div></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-4">Salvar na Nuvem</button>
                    </form>
                </div>
                <div class="mt-4 pb-5">
                    <h6 class="fw-800 text-muted mb-3 text-uppercase small">Lançamentos Sincronizados</h6>
                    <div class="table-responsive"><table class="table align-middle"><tbody id="log-home-body"></tbody></table></div>
                </div>
            </div>

            <!-- ABA RELATÓRIOS -->
            <div class="tab-pane fade" id="content-relatorios">
                <div class="card p-4 mb-4">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-4"><label class="form-label">Mês</label><select id="filtro-mes" class="form-select"></select></div>
                        <div class="col-md-4"><label class="form-label">Ano</label><select id="filtro-ano" class="form-select"></select></div>
                        <div class="col-md-4"><button class="btn btn-primary w-100" onclick="buscarRelatorio()">Filtrar</button></div>
                    </div>
                </div>
                <div id="area-relatorio" style="display: none;">
                    <div id="container-totais" class="row row-cols-1 row-cols-md-3 g-3 mb-5"></div>
                    <div class="card p-4 mb-4 bg-light">
                         <div class="row g-2">
                             <div class="col-sm-9"><select id="select-extrato" class="form-select"></select></div>
                             <div class="col-sm-3"><button class="btn btn-dark w-100 fw-700" onclick="abrirPopupExtrato()">Gerar Quadro</button></div>
                         </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Pagante</th><th>Status</th><th class="text-end">Ações</th></tr></thead>
                            <tbody id="tabela-relatorio-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ABA CONFIG -->
            <div class="tab-pane fade" id="content-config">
                <div class="row g-4">
                    <div class="col-md-4"><div class="card p-4 h-100"><h6>Nomes</h6><div class="input-group mb-3"><input type="text" id="add-nome" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('nomes', 'add-nome')">+</button></div><div id="lista-nomes"></div></div></div>
                    <div class="col-md-4"><div class="card p-4 h-100"><h6>Categorias</h6><div class="input-group mb-3"><input type="text" id="add-cat" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('categorias', 'add-cat')">+</button></div><div id="lista-categorias"></div></div></div>
                    <div class="col-md-4"><div class="card p-4 h-100"><h6>Status</h6><div class="input-group mb-3"><input type="text" id="add-status" class="form-control"><button class="btn btn-dark" onclick="salvarConfig('status', 'add-status')">+</button></div><div id="lista-status"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <div class="modal fade" id="modal-extrato" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content rounded-0 border-dark"><div class="modal-extrato-header"><h2 class="fw-900 m-0" id="extrato-nome">---</h2><p class="m-0 small fw-700" id="extrato-periodo">---</p></div><div class="modal-body p-4"><div id="extrato-tabela-container" class="table-responsive"></div><div class="mt-4 p-4 d-flex justify-content-between align-items-center border border-dark"><span class="fw-800 small">DÍVIDA CONSOLIDADA</span><h2 id="extrato-total" class="fw-900 m-0">R$ 0,00</h2></div></div><div class="modal-footer border-0 p-4 pt-0"><button type="button" class="btn btn-outline-dark fw-800" data-bs-dismiss="modal">FECHAR</button><button type="button" class="btn btn-dark fw-800" onclick="window.print()">IMPRIMIR</button></div></div></div></div>
    <div class="modal fade" id="modal-editar" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content rounded-0 border-dark"><div class="modal-header border-0 p-4"><h5 class="fw-900 m-0 text-uppercase">Modificar Lançamento</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><input type="hidden" id="edit-id"><div class="row g-3"><div class="col-12"><label class="form-label">Descrição</label><input type="text" class="form-control" id="edit-desc"></div><div class="col-md-6"><label class="form-label">Vencimento</label><input type="date" class="form-control" id="edit-vencimento"></div><div class="col-md-6"><label class="form-label">Valor (BRL)</label><input type="text" class="form-control" id="edit-valor"></div><div class="col-md-6"><label class="form-label">Categoria</label><select id="edit-categoria" class="form-select"></select></div><div class="col-md-6"><label class="form-label">Status</label><select id="edit-status" class="form-select"></select></div><div class="col-md-12"><label class="form-label">Pagante</label><select id="edit-pagante" class="form-select"></select></div><div class="col-12"><label class="form-label">Divisão Corrente:</label><div id="edit-dividir-com" class="p-3 bg-light border"></div></div></div><button class="btn btn-primary w-100 mt-4 py-3" onclick="atualizarLancamento()">Salvar Alterações</button></div></div></div></div>
    <div class="modal fade" id="modal-excluir" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content rounded-0 border-dark p-4 text-center"><h5 class="fw-900 text-uppercase mb-3">Excluir Registro?</h5><div class="d-grid gap-2 mt-4"><button class="btn btn-outline-dark fw-800" id="btn-excluir-um">SÓ ESTA PARCELA</button><button class="btn btn-dark fw-800" id="btn-excluir-todos">TODO O GRUPO</button><button class="btn btn-light fw-800" data-bs-dismiss="modal">CANCELAR</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_2v8Gs8D_j-QGXlCJMLit-CkLe3LWpU8",
            authDomain: "gestorfinanceiro-eb906.firebaseapp.com",
            databaseURL: "https://gestorfinanceiro-eb906-default-rtdb.firebaseio.com",
            projectId: "gestorfinanceiro-eb906",
            storageBucket: "gestorfinanceiro-eb906.firebasestorage.app",
            messagingSenderId: "826391364712",
            appId: "1:826391364712:web:d54276eb18e805128227dd"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const dbRoot = ref(database, 'gestor_pro');

        let db = {
            lancamentos: {},
            config: {
                nomes: ["Eu", "Outro"],
                categorias: ["Moradia", "Contas Fixas", "Mercado", "Lazer"],
                status: ["Pendente", "Pago", "Atrasado"]
            }
        };

        let modalExtrato, modalEditar, modalExcluir;
        let idFilaExclusao = null;

        document.addEventListener('DOMContentLoaded', () => {
            modalExtrato = new bootstrap.Modal(document.getElementById('modal-extrato'));
            modalEditar = new bootstrap.Modal(document.getElementById('modal-editar'));
            modalExcluir = new bootstrap.Modal(document.getElementById('modal-excluir'));
            
            onValue(dbRoot, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    db.lancamentos = data.lancamentos || {};
                    db.config = data.config || db.config;
                    refreshUI();
                    renderizarRecentes();
                } else {
                    set(dbRoot, db);
                }
            });

            initApp();
            document.getElementById('btn-excluir-um').onclick = () => confirmarAcaoExcluir(false);
            document.getElementById('btn-excluir-todos').onclick = () => confirmarAcaoExcluir(true);
        });

        // FUNÇÃO DE RESTAURAÇÃO PARA NUVEM
        window.importarParaNuvem = (input) => {
            const f = input.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = async e => {
                try {
                    const j = JSON.parse(e.target.result);
                    if(confirm("RESTAURAR BACKUP? Todos os dados atuais na NUVEM serão substituídos pelo arquivo.")) {
                        // Converte lançamentos de Array (formato antigo) para Objeto (formato Firebase) se necessário
                        if (Array.isArray(j.lancamentos)) {
                            const obj = {};
                            j.lancamentos.forEach(l => { obj[l.id || "ID-"+Math.random().toString(36).substr(2,9)] = l; });
                            j.lancamentos = obj;
                        }
                        await set(dbRoot, j);
                        alert("Dados restaurados com sucesso na nuvem!");
                        location.reload();
                    }
                } catch(err) { alert("Arquivo inválido."); console.error(err); }
            };
            r.readAsText(f);
        }

        function initApp() {
            configurarFiltrosData();
            aplicarMascaraMoeda(document.getElementById('form-valor'));
            aplicarMascaraMoeda(document.getElementById('edit-valor'));
            document.getElementById('form-nova-despesa').addEventListener('submit', salvarNovoLancamento);
        }

        function refreshUI() {
            popularSelect('form-categoria', db.config.categorias);
            popularSelect('edit-categoria', db.config.categorias);
            popularSelect('form-status', db.config.status);
            popularSelect('edit-status', db.config.status);
            popularSelect('form-pagante', db.config.nomes);
            popularSelect('edit-pagante', db.config.nomes);
            gerarOpcoesDivisao('form-dividir-com', db.config.nomes);
            gerarOpcoesDivisao('edit-dividir-com', db.config.nomes);
            renderizarListasConfig();
        }

        async function salvarNovoLancamento(e) {
            e.preventDefault();
            const valorTotal = parseFloat(document.getElementById('form-valor').value.replace(/\./g, '').replace(',', '.'));
            const qtd = parseInt(document.getElementById('form-qtd-parcelas').value) || 1;
            const divisao = capturarValoresDivisao('form-dividir-com');
            const dataOrig = document.getElementById('form-vencimento').value;
            const groupId = "G" + Date.now();
            
            const novosItens = {};
            for (let i = 0; i < qtd; i++) {
                const dataObj = new Date(dataOrig + 'T12:00:00');
                dataObj.setMonth(dataObj.getMonth() + i);
                const formatYMD = dataObj.toISOString().split('T')[0];
                const newId = "ID-" + Date.now() + "-" + i;
                novosItens[newId] = { id: newId, groupId: qtd > 1 ? groupId : null, desc: document.getElementById('form-desc').value.toUpperCase() + (qtd > 1 ? ` (${i+1}/${qtd})` : ""), vencimento: formatYMD, valor: valorTotal, categoria: document.getElementById('form-categoria').value, pagante: document.getElementById('form-pagante').value, status: document.getElementById('form-status').value, divisao: divisao };
            }
            await update(ref(database, 'gestor_pro/lancamentos'), novosItens);
            e.target.reset();
            document.getElementById('form-qtd-parcelas').value = 1;
        }

        function renderizarRecentes() {
            const b = document.getElementById('log-home-body');
            const h = new Date();
            const m = ('0' + (h.getMonth() + 1)).slice(-2);
            const a = h.getFullYear().toString();
            const items = Object.values(db.lancamentos).filter(d => {
                const p = d.vencimento.split('-');
                return p[1] === m && p[0] === a;
            }).sort((a,b) => b.vencimento.localeCompare(a.vencimento));
            b.innerHTML = items.slice(0, 10).map(d => `<tr class="bg-white border-bottom"><td width="90" class="fw-bold text-muted small">${d.vencimento.split('-').reverse().slice(0,2).join('/')}</td><td><div class="fw-bold small">${d.desc}</div><small class="text-muted text-uppercase">${d.categoria}</small></td><td class="fw-900">R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td><td class="text-end"><button class="btn-action" onclick="window.abrirEdicao('${d.id}')"><i class="bi bi-pencil-fill"></i></button><button class="btn-action text-danger" onclick="window.confirmarExcluir('${d.id}')"><i class="bi bi-trash-fill"></i></button></td></tr>`).join('');
        }

        window.confirmarExcluir = (id) => { idFilaExclusao = id; const item = db.lancamentos[id]; if (item && item.groupId) modalExcluir.show(); else if(confirm("Confirmar exclusão?")) confirmarAcaoExcluir(false); }
        async function confirmarAcaoExcluir(todos) {
            const i = db.lancamentos[idFilaExclusao];
            if (todos && i.groupId) {
                const targets = Object.keys(db.lancamentos).filter(k => db.lancamentos[k].groupId === i.groupId);
                for(let k of targets) await remove(ref(database, `gestor_pro/lancamentos/${k}`));
            } else { await remove(ref(database, `gestor_pro/lancamentos/${idFilaExclusao}`)); }
            modalExcluir.hide();
        }

        window.abrirEdicao = (id) => {
            const d = db.lancamentos[id]; if (!d) return;
            document.getElementById('edit-id').value = d.id;
            document.getElementById('edit-desc').value = d.desc;
            document.getElementById('edit-vencimento').value = d.vencimento;
            document.getElementById('edit-valor').value = d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2});
            document.getElementById('edit-categoria').value = d.categoria;
            document.getElementById('edit-status').value = d.status;
            document.getElementById('edit-pagante').value = d.pagante;
            carregarDivisaoParaEdicao('edit-dividir-com', d.divisao);
            modalEditar.show();
        }

        window.atualizarLancamento = async () => {
            const id = document.getElementById('edit-id').value;
            const valor = parseFloat(document.getElementById('edit-valor').value.replace(/\./g, '').replace(',', '.'));
            const updated = { ...db.lancamentos[id], desc: document.getElementById('edit-desc').value.toUpperCase(), vencimento: document.getElementById('edit-vencimento').value, valor: valor, categoria: document.getElementById('edit-categoria').value, status: document.getElementById('edit-status').value, pagante: document.getElementById('edit-pagante').value, divisao: capturarValoresDivisao('edit-dividir-com') };
            await set(ref(database, `gestor_pro/lancamentos/${id}`), updated);
            modalEditar.hide();
        }

        window.buscarRelatorio = () => {
            const m = document.getElementById('filtro-mes').value, a = document.getElementById('filtro-ano').value;
            const filtrados = Object.values(db.lancamentos).filter(d => { const p = d.vencimento.split('-'); return p[1] === m && p[0] === a; }).sort((a,b) => a.vencimento.localeCompare(b.vencimento));
            document.getElementById('area-relatorio').style.display = 'block';
            const totais = {}; db.config.nomes.forEach(n => totais[n] = 0);
            filtrados.forEach(d => { const res = calcularDivisaoIndividual(d.valor, d.divisao); for(let n in res) if(totais.hasOwnProperty(n)) totais[n] += res[n]; });
            document.getElementById('container-totais').innerHTML = Object.entries(totais).map(([n,v]) => `<div class="col"><div class="total-card"><div class="total-icon"><i class="bi bi-person"></i></div><div><h6>${n}</h6><h4>R$ ${v.toLocaleString('pt-BR',{minimumFractionDigits:2})}</h4></div></div></div>`).join('');
            document.getElementById('tabela-relatorio-body').innerHTML = filtrados.map(d => `<tr class="border-bottom"><td class="small fw-bold text-muted">${d.vencimento.split('-').reverse().join('/')}</td><td class="fw-800 small">${d.desc}</td><td class="fw-900">R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td class="small text-uppercase">${d.pagante}</td><td><span class="badge-status">${d.status}</span></td><td class="text-end"><button class="btn btn-sm btn-outline-dark fw-800" onclick="window.abrirEdicao('${d.id}')">EDITAR</button></td></tr>`).join('');
            popularSelect('select-extrato', db.config.nomes);
        }

        window.abrirPopupExtrato = () => {
            const int = document.getElementById('select-extrato').value, m = document.getElementById('filtro-mes').value, a = document.getElementById('filtro-ano').value;
            if (!int) return alert("Selecione alguém.");
            const items = Object.values(db.lancamentos).filter(d => { const p = d.vencimento.split('-'); const periodo = p[1] === m && p[0] === a; const participa = d.divisao.some(s => s.split(':')[0] === int); return periodo && participa; });
            if (items.length === 0) return alert("Nada encontrado.");
            let t = 0;
            const body = items.map(d => { const parte = calcularDivisaoIndividual(d.valor, d.divisao)[int] || 0; t += parte; return `<tr><td class="small text-muted">${d.vencimento.split('-').reverse().join('/')}</td><td class="fw-bold">${d.desc}</td><td class="text-end small">R$ ${d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td><td class="text-end fw-900">R$ ${parte.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td></tr>`; }).join('');
            document.getElementById('extrato-nome').textContent = int;
            document.getElementById('extrato-periodo').textContent = `MÊS: ${m}/${a}`;
            document.getElementById('extrato-tabela-container').innerHTML = `<table class="table table-sm border"><thead><tr><th>DATA</th><th>DESCRIÇÃO</th><th class="text-end">VALOR</th><th class="text-end">SUA PARTE</th></tr></thead><tbody>${body}</tbody></table>`;
            document.getElementById('extrato-total').textContent = "R$ " + t.toLocaleString('pt-BR',{minimumFractionDigits:2});
            modalExtrato.show();
        }

        function calcularDivisaoIndividual(total, array) {
            const res = {}; let pSum = 0; let sem = [];
            array.forEach(i => { const parts = i.split(':'); if(parts.length > 1) { const v = parseFloat(parts[1])||0; res[parts[0]] = total * (v/100); pSum += v; } else sem.push(i); });
            if(sem.length > 0) { const restoVal = total * (Math.max(0, 100 - pSum) / 100); sem.forEach(n => res[n] = restoVal / sem.length); }
            return res;
        }

        function popularSelect(id, lista) {
            const el = document.getElementById(id); const val = el.value;
            el.innerHTML = '<option value="">- SELECIONAR -</option>' + lista.map(i => `<option value="${i}">${i}</option>`).join('');
            if(val) el.value = val;
        }

        function gerarOpcoesDivisao(containerId, nomes) {
            const container = document.getElementById(containerId); const currentChecks = capturarValoresDivisao(containerId);
            container.innerHTML = nomes.map((nome, idx) => {
                const match = currentChecks.find(c => c.split(':')[0] === nome);
                return `<div class="divider-box"><div class="form-check m-0"><input class="form-check-input border-dark" type="checkbox" id="${containerId}-${idx}" value="${nome}" ${match ? 'checked' : ''} onchange="this.closest('.divider-box').querySelector('.perc-field').disabled = !this.checked"><label class="form-check-label small fw-bold text-uppercase" for="${containerId}-${idx}">${nome}</label></div><div class="input-group input-group-sm" style="width: 80px;"><input type="number" class="form-control perc-field border-dark" placeholder="%" ${match ? '' : 'disabled'} value="${match && match.includes(':') ? match.split(':')[1] : ''}"></div></div>`;
            }).join('');
        }

        function capturarValoresDivisao(containerId) {
            const res = []; document.getElementById(containerId).querySelectorAll('.divider-box').forEach(row => { const cb = row.querySelector('.form-check-input'), pf = row.querySelector('.perc-field'); if(cb.checked) res.push(pf.value ? `${cb.value}:${pf.value}` : cb.value); });
            return res;
        }

        function carregarDivisaoParaEdicao(containerId, valores) {
            document.getElementById(containerId).querySelectorAll('.divider-box').forEach(row => { const cb = row.querySelector('.form-check-input'), pf = row.querySelector('.perc-field'); const match = (valores || []).find(v => v.split(':')[0] === cb.value); cb.checked = !!match; pf.disabled = !match; pf.value = match && match.includes(':') ? match.split(':')[1] : ''; });
        }

        function configurarFiltrosData() {
            const m = document.getElementById('filtro-mes'), a = document.getElementById('filtro-ano'), h = new Date();
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            meses.forEach((nm, i) => m.add(new Option(nm.toUpperCase(), ('0'+(i+1)).slice(-2), false, i === h.getMonth())));
            for(let i = h.getFullYear(); i >= h.getFullYear()-2; i--) a.add(new Option(i, i));
        }

        function renderizarListasConfig() {
            ['nomes','categorias','status'].forEach(t => { const cid = (t === 'nomes') ? 'lista-nomes' : (t === 'categorias') ? 'lista-categorias' : 'lista-status'; document.getElementById(cid).innerHTML = db.config[t].map((it, idx) => `<div class="d-flex justify-content-between border-bottom py-1 small"><span>${it.toUpperCase()}</span><button class="btn btn-sm text-danger p-0" onclick="window.removerConfig('${t}',${idx})"><i class="bi bi-x"></i></button></div>`).join(''); });
        }

        window.salvarConfig = (t, i) => { const v = document.getElementById(i).value.trim(); if(!v || db.config[t].includes(v)) return; db.config[t].push(v); set(ref(database, 'gestor_pro/config'), db.config); document.getElementById(i).value = ''; }
        window.removerConfig = (t, idx) => { if(confirm("Remover permanentemente?")) { db.config[t].splice(idx, 1); set(ref(database, 'gestor_pro/config'), db.config); } }
        function aplicarMascaraMoeda(el) { el.addEventListener('input', e => { let v = e.target.value.replace(/\D/g, ''); if (!v) { e.target.value = ''; return; } v = (parseInt(v, 10) / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); e.target.value = v; }); }
        window.exportarBackup = () => { const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `FINPRO_CLOUD_BK_${new Date().toISOString().slice(0,10)}.json`; a.click(); }
    </script>
</body>
</html>
